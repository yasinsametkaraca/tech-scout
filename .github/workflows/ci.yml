name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          # One Windows job ensures the cross-platform paths in atomic_io,
          # file_lock, path_safety, and the manifest readers stay healthy.
          # Pinning to 3.12 keeps the Windows leg fast and avoids 3.13 wheel
          # availability gotchas while still proving we run on Windows.
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src scripts tests

      - name: Format check with ruff
        run: ruff format --check src scripts tests

      - name: Type check with mypy
        run: mypy src scripts

      - name: Run tests with coverage
        run: pytest

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore

  doctor:
    name: Doctor smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run doctor (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python scripts/ts_doctor.py || EXIT_CODE=$?
          # ts_doctor exits 1 on errors. In CI the default output root may
          # not exist yet — write_probe creates it, but disk space and
          # warnings should not fail the build. Allow exit codes 0 (no
          # errors) or 1 (errors we explicitly tolerate when running in
          # a vanilla container).
          if [[ -n "$EXIT_CODE" && "$EXIT_CODE" != "0" && "$EXIT_CODE" != "1" ]]; then
            echo "Doctor exited with unexpected code $EXIT_CODE"
            exit 1
          fi

      - name: Run doctor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process python -ArgumentList "scripts/ts_doctor.py" -Wait -PassThru -NoNewWindow
          if ($process.ExitCode -gt 1) {
            Write-Error "Doctor exited with unexpected code $($process.ExitCode)"
            exit 1
          }

      - name: Verify console scripts installed
        shell: bash
        run: |
          ts-doctor --help || true
          ts-locale-info --list
