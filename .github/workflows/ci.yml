name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src scripts tests

      - name: Format check with ruff
        run: ruff format --check src scripts tests

      - name: Type check with mypy
        run: mypy src scripts

      - name: Run tests with coverage
        run: pytest

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore

  doctor:
    name: Doctor smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run doctor (warnings ok, errors not)
        run: |
          python scripts/ts_doctor.py || EXIT_CODE=$?
          # ts_doctor exits 1 on errors. In CI the default output root may
          # not exist yet — that's a warning (will be auto-created on first
          # run), not an error. Allow exit code 0 (no errors) or 1 (errors
          # we explicitly tolerate).
          if [[ -n "$EXIT_CODE" && "$EXIT_CODE" != "0" && "$EXIT_CODE" != "1" ]]; then
            echo "Doctor exited with unexpected code $EXIT_CODE"
            exit 1
          fi
